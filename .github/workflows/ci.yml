name: CI

# Pre-merge gate. deploy.yml only runs on push to main (post-merge), so without
# this PRs would merge unverified. Keep this fast: typecheck, unit tests, build.
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  verify:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Set up local D1
        run: |
          pnpm db:migrate:local
          pnpm db:seed

      # Playwright's webServer (playwright/config) starts `pnpm dev` on :6700
      # and runs in the workerd runtime via the Cloudflare Vite plugin.
      # Functional specs only; visual-regression has stale baselines and
      # auth/collaboration need real OAuth, so they're excluded from the gate.
      - name: Run E2E (functional, chromium)
        run: pnpm test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  qa-deploy:
    name: QA preview deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    # Secrets are only available to same-repo PRs (fork PRs can't deploy).
    if: github.event.pull_request.head.repo.full_name == github.repository
    # Non-blocking: requires the Worker to already exist (do the first prod
    # `wrangler deploy` once) and currently shares prod bindings (D1/KV) until
    # dedicated QA resources are configured. See notes in the PR.
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # `wrangler versions upload` deploys a *preview* version (its own URL)
      # without promoting to production. Requires the Worker to exist.
      - name: Upload preview version
        id: preview
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler versions upload 2>&1 | tee /tmp/wrangler.out
          url=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' /tmp/wrangler.out | head -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          if [ -n "$url" ]; then echo "QA preview: $url" >> "$GITHUB_STEP_SUMMARY"; fi

      - name: Comment QA preview URL on the PR
        if: steps.preview.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "🚀 QA preview deployed: ${{ steps.preview.outputs.url }}"
